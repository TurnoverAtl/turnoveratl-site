<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Careers | Turnover ATL Cleaning</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<header>
  <div class="wrap navbar">
    <a class="brand" href="index.html">
      <span>Turnover ATL Cleaning</span>
    </a>

    <nav class="navlinks">
      <a href="services.html">Services</a>
      <a href="pricing.html">Pricing</a>
      <a href="about.html">About</a>
      <a href="apply.html">Careers</a>
      <a class="cta" href="book.html">Book a Cleaning</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <section class="hero">
    <h1>Apply to clean with Turnover ATL</h1>
    <p>Reliable cleaners. Clear standards. Consistent work.</p>

    <div id="successMsg" class="trustItem" style="display:none;">
      ✅ Application submitted
    </div>
  </section>

  <section class="section">
    <div class="formCard">

      <form action="https://formspree.io/f/mgopddjk" method="POST">

        <input type="hidden" name="_subject" value="New Cleaner Application — Turnover ATL">
        <input type="hidden" name="_next" value="https://turnoveratl.com/apply.html?sent=1">

        <!-- CONTACT -->
        <div class="serviceCard">
          <h3>Contact</h3>

          <input class="input" type="text" name="name" placeholder="Full name" required>
          <input class="input" type="email" name="email" placeholder="Email" required>
          <input class="input" type="tel" name="phone" placeholder="Phone" required>
          <input class="input" type="text" name="service_area" placeholder="Service area">
        </div>

        <!-- AVAILABILITY -->
        <div class="serviceCard">
          <h3>Availability</h3>

          <select class="select" name="availability" required>
            <option value="">Select availability</option>
            <option>Weekdays</option>
            <option>Weekends</option>
            <option>Both</option>
          </select>
        </div>

        <!-- EXPERIENCE -->
        <div class="serviceCard">
          <h3>Experience</h3>

          <select class="select" name="experience" required>
            <option value="">Select experience</option>
            <option>1+ years</option>
            <option>Some experience</option>
            <option>New</option>
          </select>

          <textarea class="textarea" name="notes" placeholder="Tell us about your experience"></textarea>
        </div>

        <!-- SUBMIT -->
        <div class="actions">
          <button class="btn" type="submit">Submit application</button>
        </div>

      </form>

    </div>
  </section>

</main>

<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('sent') === '1') {
    document.getElementById('successMsg').style.display = 'block';
  }
</script>

</body>
</html>
