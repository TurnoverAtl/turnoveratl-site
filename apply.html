<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Careers | Turnover ATL Cleaning</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
    }
    .msg {
      display: none;
      margin-bottom: 20px;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f6f6f6;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 120px;
    }
    button {
      margin-top: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Apply to clean with Turnover ATL</h1>

  <div id="successMsg" class="msg">
    ✅ Your application was submitted.
  </div>

  <form action="https://formspree.io/f/mgopddjk" method="POST">
    <input type="hidden" name="_subject" value="New Cleaner Application — Turnover ATL">
    <input type="hidden" name="_next" value="https://turnoveratl.com/apply.html?sent=1">

    <label for="name">Full name</label>
    <input id="name" type="text" name="name" required>

    <label for="email">Email</label>
    <input id="email" type="email" name="email" required>

    <label for="phone">Phone</label>
    <input id="phone" type="tel" name="phone" required>

    <label for="area">Areas you can serve</label>
    <input id="area" type="text" name="service_area">

    <label for="experience">Cleaning experience</label>
    <select id="experience" name="experience" required>
      <option value="">Select one</option>
      <option>Yes — 1+ year</option>
      <option>Yes — some experience</option>
      <option>No short-term rental, but experienced cleaner</option>
      <option>New to cleaning</option>
    </select>

    <label for="notes">Tell us about your experience</label>
    <textarea id="notes" name="experience_notes"></textarea>

    <button type="submit">Submit application</button>
  </form>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('sent') === '1') {
      document.getElementById('successMsg').style.display = 'block';
    }
  </script>

</body>
</html>
